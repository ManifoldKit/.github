name: CI

# This repo had NO CI. That is a sharp edge, because nothing here is a leaf:
# every workflow in `.github/workflows/` is a `workflow_call` reusable consumed
# by manifold-llama, manifold-mlx, manifold-eval and basechat, and
# `.github/actions/setup-swift-ci` is a composite they all run. A syntax or
# expression error therefore does not fail *here* — it fails on first use, in
# every caller at once, after merge.
#
# That is not hypothetical. PR #6 changed a `runs-on` to a computed expression;
# `yaml.safe_load` accepting it proves nothing, because YAML validity and
# GitHub *expression* validity are different questions, and the latter is only
# evaluated at job start. The reviewer's honest position was "confidence high,
# not certain — a real run is the only proof", and there was no run to have.
# `actionlint` parses the expression grammar, so it settles that class of
# question before merge instead of after.
#
# Deliberately NOT skipped on draft PRs. A skipped required check counts as
# passing, which is the exact hole PR #6 fixed in `swift-ci.yml`; re-creating it
# here to save a few seconds of ubuntu time would be absurd. This job is cheap
# and always runs.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Pinned version + checksum rather than a third-party action or a
      # `curl | bash` of an unpinned installer: this repo is the supply chain
      # for four other repos' CI, so what it executes should be auditable and
      # reproducible. Bump both values together.
      - name: Install actionlint (pinned, checksum-verified)
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          curl -fsSL --retry 3 -o "$tarball" "$url"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum --check --strict -
          tar -xzf "$tarball" actionlint
          ./actionlint --version

      # actionlint checks workflow schema, `uses:` shapes, context availability
      # per key, and the expression grammar inside `${{ }}`. shellcheck is
      # preinstalled on ubuntu runners, and actionlint auto-detects it to lint
      # every `run:` block, so shell bugs in the reusable workflows are caught
      # here too.
      - name: actionlint (workflows, expressions, run-block shell)
        run: ./actionlint -color

      # actionlint globs `.github/workflows/` only, so the composite action is
      # invisible to it despite being shared infrastructure every caller
      # executes. Parse it and shellcheck its bash steps explicitly.
      - name: Lint composite actions
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for action in .github/actions/*/action.yml .github/actions/*/action.yaml; do
            found=1
            echo "==> $action"
            python3 - "$action" <<'PY'
          import sys, pathlib, yaml
          path = pathlib.Path(sys.argv[1])
          doc = yaml.safe_load(path.read_text())
          if not isinstance(doc, dict) or "runs" not in doc:
              sys.exit(f"{path}: not a valid action definition (no `runs:` key)")
          steps = (doc.get("runs") or {}).get("steps") or []
          out = pathlib.Path("_action_shell")
          out.mkdir(exist_ok=True)
          count = 0
          for i, step in enumerate(steps):
              script = step.get("run")
              if not script:
                  continue
              shell = step.get("shell", "")
              if shell not in ("bash", "sh"):
                  # A non-shell step (node, pwsh, composite `uses:`) is not ours
                  # to shellcheck; skip rather than mis-lint it.
                  continue
              target = out / f"{path.parent.name}_{i}.sh"
              target.write_text("#!/usr/bin/env bash\n" + script)
              count += 1
          print(f"    extracted {count} shell step(s)")
          PY
          done
          if [ "$found" -eq 0 ]; then
            echo "No composite actions found — nothing to lint."
            exit 0
          fi
          if [ -d _action_shell ] && [ -n "$(ls -A _action_shell)" ]; then
            # `-e` on the extracted fragments: a composite step is a fragment,
            # not a whole program, so unassigned-variable and sourcing warnings
            # would be noise. Real bugs (quoting, test syntax) still fail.
            shellcheck --shell=bash --exclude=SC2148,SC2034,SC1091 _action_shell/*.sh
            echo "shellcheck clean across extracted composite steps."
          fi
