name: Companion canary (reusable)

# Reusable `workflow_call` port of the canary workflow that manifold-llama
# and manifold-mlx each carried as a ~51-line local copy. Builds + tests the
# caller repo against ManifoldKit/ManifoldKit's `core-ref` HEAD (NOT the
# latest published tag) to catch a core seam move before it ships. A failure
# means the core seam moved — not that the caller regressed.
#
# `rm Package.resolved && swift package resolve` against a `.upToNextMinor`
# (or `exact`) pin only ever resolves to a published tag, never an unreleased
# branch — so it would silently test already-released core and give false
# confidence. This checks out core at `core-ref` and `swift package edit`s
# the dependency to point at that local checkout instead.
#
# Callers keep their own schedule / workflow_dispatch / repository_dispatch
# triggers and call this via `jobs.<id>.uses`.
on:
  workflow_call:
    inputs:
      core-ref:
        description: "ManifoldKit/ManifoldKit ref to canary against."
        required: false
        type: string
        default: main

permissions:
  contents: read

jobs:
  canary:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check out ManifoldKit at core-ref
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ManifoldKit/ManifoldKit
          ref: ${{ inputs.core-ref }}
          path: core
      - name: Select newest Xcode 26 toolchain
        # The image default mis-resolves the dependency graph; Swift 6.3
        # (Xcode 26.3) prunes trait-disabled edges correctly — same
        # toolchain as the caller's local gate.
        run: |
          sudo xcode-select -s "$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' | sort -V | tail -1)/Contents/Developer"
          swift --version
      - name: Point ManifoldKit dependency at core checkout
        # `swift package edit` swaps the dependency to the local checkout,
        # bypassing the pin (published-tags-only) and Package.resolved
        # without dirtying Package.swift.
        run: swift package edit manifoldkit --path ./core
      - name: Build
        run: swift build
      - name: Test
        # NO --parallel: ManifoldBackendTestKit's BackendContractChecks
        # claims registry is process-global.
        run: swift test
